schema: spec-driven

# Project context
context: |
  # Incrementa-Gestion

  ## Descripción
  Sistema de gestión de templates de contratos, con proyección a incorporar
  otras componentes de gestión en el futuro.

  ## Tech Stack

  **Frontend**
  - Vite + React
  - Redux para manejo de estado
  - Nunito Sans como fuente exclusiva del sistema; archivos TTF locales en
    `frontend/src/assets/fonts/`, declarada vía @font-face en `global.css`;
    pesos disponibles: 400, 500, 600, 700, 800 (regular, medium, semibold, bold, extrabold)
  - Lora (Google Fonts) usada ÚNICAMENTE dentro del editor de cláusulas Tiptap
    (variable --font-family-clause-editor); no usar en ningún otro contexto
  - React Router para navegación
  - CSS personalizado siguiendo guías de diseño corporativo

  **Backend**
  - Node.js + Express (REST API)

  **Base de datos**
  - PostgreSQL en GCP
  - Knex.js para migraciones y gestión de versiones de BD

  ## Autenticación y Seguridad

  **Autenticación de usuarios (frontend)**
  - Keycloak 26 como proveedor OIDC
  - El perfil/alcance del usuario se resuelve automáticamente tras el login

  **Validación en API (backend)**
  - Cada endpoint protegido valida JWT emitido por Keycloak
  - Rutas públicas se declaran explícitamente; el resto requiere autenticación por defecto

  ## Entornos

  Tres ambientes: `local`, `dev`, `prod`
  Selección mediante variable única: `ENVIRONMENT`

  **Configuración por archivos (no .env):**
  - Frontend: `config.js` exporta objeto con configuración por ambiente
  - Backend: `config.js` exporta objeto con configuración por ambiente

  ## Infraestructura

  - `dev` y `prod` desplegados en GCP
  - IaC a definir

  ## Workflow de desarrollo

  - Frontend y backend con hot reload en desarrollo
  - Ambos servicios corren simultáneamente en sesiones de consola separadas

  ## Locale - Chile

  - País: Chile
  - Timezone: `America/Santiago`
  - Idioma: `es-CL`
  - Formato numérico: `XXX.XXX,X` (separador de miles: punto, decimal: coma)
  - Formato de fecha: `YYYY-MM-DD` (ISO 8601)
  - Formato RUT: `XX.XXX.XXX-X` (separador de miles: punto, guión antes del dígito verificador).
    Implementación canónica en `frontend/src/utils/rut.js`; campos editables con
    `frontend/src/components/RutInput.jsx`. Ver `locale.rut_format` y reglas en `design`.

  ## Convenciones de Base de Datos (naming)

  - Nombres de tablas en **inglés** y en **singular** por defecto
  - Nombres de columnas/campos en **inglés** (snake_case)
  - Excepciones (plural) solo cuando exista una razón clara y documentada
  - Mantener consistencia en todo el esquema

# Per-artifact rules
rules:
  proposal:
    - Incluir siempre sección de "Consideraciones de seguridad" para funcionalidades que manejen datos sensibles
    - Especificar validaciones tanto en frontend como backend
    - Considerar locale chileno en formatos de fecha y números
    - Incluir manejo de errores en español (es-CL)

  tasks:
    - Dividir tareas en chunks máximo de 2 horas
    - Incluir tests unitarios para lógica de negocio crítica
    - Considerar configuración por ambiente en cada feature
    - Validar autenticación y autorización en endpoints protegidos

  design:
    - "Seguir estrictamente las guías de diseño corporativo ERP"
    - "Implementar responsive design (mobile-first)"
    - "Usar timezone America/Santiago para fechas"
    - "Aplicar formato numérico chileno en displays de montos"
    - "Aplicar formato RUT chileno (XX.XXX.XXX-X) en toda visualización y campos de entrada; usar `formatRut`/`formatRutDisplay` para mostrar y `RutInput` o `formatRutInput` al editar (onBlur). Ver `locale.rut_format` en este archivo"
    - "Las reglas visuales y de UI definidas en este archivo (`config.yaml`) son la fuente oficial para implementar el frontend; no reinterpretar estilos ni inventar variantes fuera de estas definiciones"

    # OBJETIVO VISUAL GENERAL
