    - "Nunito Sans declarada vía @font-face en frontend/src/styles/global.css; variable CSS: --font-family-base"
    - "Pesos permitidos de Nunito Sans: 400 (cuerpo/normal), 500 (medium), 600 (semibold/labels), 700 (bold/títulos principales), 800 (extrabold/títulos primer nivel jerarquía)"
    - "Fuente exclusiva del EDITOR DE CLÁUSULAS (Tiptap): Lora (Google Fonts); variable CSS: --font-family-clause-editor; NO usar en ningún otro contexto"
    - "NO usar Inter, Syne, Roboto ni ninguna otra fuente como principal del sistema"
    - "CRÍTICO: todos los elementos de formulario (<button>, <input>, <select>, <textarea>) deben heredar la fuente con `font-family: inherit` en el reset global; los navegadores no heredan automáticamente"
