# Tokens de UI (hex canónicos). El frontend las expone como variables CSS en `variables.css`.
locale:
  rut_format:
    description: >
      Formato estándar del RUT chileno en visualización y campos de entrada en todo el sistema.
    pattern: "XX.XXX.XXX-X"
    example: "12.345.678-9"
    thousands_separator: "."
    verifier_separator: "-"
    input_placeholder: "12.345.678-9"
    implementation:
      utils: "frontend/src/utils/rut.js"
      input_component: "frontend/src/components/RutInput.jsx"
    rules:
      - "Todo RUT mostrado al usuario debe usar separador de miles (punto) y guión antes del dígito verificador"
      - "Visualización: usar formatRut(rutBody, rutDv) o formatRutDisplay(cadena)"
      - "Campos editables: usar el componente RutInput, que formatea con formatRutInput al perder el foco (onBlur)"
      - "NO mostrar ni persistir en UI un RUT sin formatear cuando el valor es parseable"
      - "La validación de RUT (módulo 11) permanece en parseRut/parseOptionalRut; el formateo es independiente y no sustituye la validación"

ui_tokens:
  form_field_readonly:
    description: >
      Campos de formulario no editables: solo lectura, metadatos del sistema, valores
      calculados o deshabilitados. Misma regla en todo el sistema.
    background: "#FAFAFA"
    text: "#727F9A"
    border: "#E3E6E8"

  button:
    description: >
      Botones de acción universales del sistema. Forma píldora (border-radius 9999px).
      El efecto de presionado debe ser visualmente muy notorio.
    background: "#FFFFFF"
    border: "#C8CDD2"
    text: "#1a1a1a"
    background_hover: "#F5F6F7"
    background_active: "#D9DBE0"
    border_radius: "9999px"
    danger_text: "#b42318"
    danger_border: "#b42318"
    danger_background_hover: "#FEF2F2"
    danger_background_active: "#FECACA"

  card:
    description: >
      Contenedores tipo card o panel en el área de trabajo. Sin sombra, con borde sutil
      y esquinas redondeadas 8px.
    background: "#FFFFFF"
    border: "#E3E6E8"
    border_radius: "8px"
    padding: "12px"

  sidebar:
    description: >
      Sidebar de navegación. Fondo blanco, texto oscuro. Estados de hover y activo
      diferenciados con fondos sutiles y acento lateral para el ítem activo.
    background: "#FFFFFF"
    background_submenu: "#FAFAFA"
    border_right: "#E3E6E8"
    text: "#1a1a1a"
    text_subdued: "#5a6370"
    hover_background: "rgba(0,0,0,0.05)"
    active_background: "#EBEDF0"
    active_accent_color: "#657A8A"
    active_text: "#031B30"
    font_weight_first_level: "700"
    font_weight_submenu: "400"
    shadow_right: "4px 0 12px rgba(0,0,0,0.08)"
