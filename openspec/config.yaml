    - "Estética tipo ERP moderno: profesional, serio, limpio, consistente y productivo"
    - "NO lúdico, decorativo ni \"marketing-style\""
    - "Priorizar claridad, jerarquía visual, alineación, compactación y repetibilidad"

    # TIPOGRAFÍA
